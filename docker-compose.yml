version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cargo_db
      POSTGRES_USER: cargo_user
      POSTGRES_PASSWORD: cargo_pass
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]   # 15672 = UI at localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: cargo
      RABBITMQ_DEFAULT_PASS: cargo

volumes:
  pgdata: